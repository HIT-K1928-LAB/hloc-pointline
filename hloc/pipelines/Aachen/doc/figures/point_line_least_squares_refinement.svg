<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .section { font: 700 20px Arial, sans-serif; fill: #1f2937; }
      .label { font: 16px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 13px Arial, sans-serif; fill: #475569; }
      .box { stroke: #475569; stroke-width: 2; rx: 12; ry: 12; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .note { stroke: #f59e0b; stroke-width: 2; fill: #fffbeb; rx: 12; ry: 12; }
      .good { stroke: #16a34a; stroke-width: 2; fill: #ecfdf5; rx: 12; ry: 12; }
      .warn { stroke: #dc2626; stroke-width: 2; fill: #fef2f2; rx: 12; ry: 12; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="700" y="40" text-anchor="middle" class="title">Point-line joint pose refinement with least_squares</text>

  <rect x="60" y="70" width="1280" height="70" class="note"/>
  <text x="700" y="103" text-anchor="middle" class="label">Trigger condition</text>
  <text x="700" y="126" text-anchor="middle" class="small">Refinement runs only after the best candidate pose is selected and only if line_correspondence_count &gt;= 4</text>

  <rect x="40" y="180" width="300" height="730" fill="#eef6ff" stroke="#bfdbfe" stroke-width="2" rx="18" ry="18"/>
  <text x="70" y="215" class="section">1. Inputs</text>

  <rect x="70" y="250" width="240" height="90" class="box" fill="#ffffff"/>
  <text x="190" y="284" text-anchor="middle" class="label">selected_candidate['point_ret']</text>
  <text x="190" y="308" text-anchor="middle" class="small">initial_pose = cam_from_world</text>

  <rect x="70" y="385" width="240" height="110" class="box" fill="#ffffff"/>
  <text x="190" y="419" text-anchor="middle" class="label">point_log</text>
  <text x="190" y="443" text-anchor="middle" class="small">keypoints_query</text>
  <text x="190" y="465" text-anchor="middle" class="small">points3D_ids</text>

  <rect x="70" y="540" width="240" height="90" class="box" fill="#ffffff"/>
  <text x="190" y="574" text-anchor="middle" class="label">line_correspondences</text>
  <text x="190" y="598" text-anchor="middle" class="small">query 2D line &lt;-&gt; 3D line segment</text>

  <rect x="70" y="675" width="240" height="110" class="box" fill="#ffffff"/>
  <text x="190" y="709" text-anchor="middle" class="label">thresholds</text>
  <text x="190" y="733" text-anchor="middle" class="small">endpoint_thresh</text>
  <text x="190" y="755" text-anchor="middle" class="small">center_thresh / angle_thresh</text>

  <rect x="70" y="820" width="240" height="60" class="box" fill="#ffffff"/>
  <text x="190" y="857" text-anchor="middle" class="small">max_refine_points = 1024</text>

  <rect x="390" y="180" width="360" height="730" fill="#fff7ed" stroke="#fed7aa" stroke-width="2" rx="18" ry="18"/>
  <text x="420" y="215" class="section">2. Parameterization and residual vector</text>

  <rect x="425" y="250" width="290" height="90" class="box" fill="#ffffff"/>
  <text x="570" y="284" text-anchor="middle" class="label">build_point_refinement_data</text>
  <text x="570" y="308" text-anchor="middle" class="small">extract 2D-3D points from point_log</text>

  <rect x="425" y="385" width="290" height="110" class="box" fill="#ffffff"/>
  <text x="570" y="419" text-anchor="middle" class="label">rigid3d_to_params</text>
  <text x="570" y="443" text-anchor="middle" class="small">Rigid3d -&gt; 6 DoF parameters</text>
  <text x="570" y="465" text-anchor="middle" class="small">[rotvec(3), translation(3)]</text>

  <rect x="425" y="540" width="290" height="180" class="box" fill="#ffffff"/>
  <text x="570" y="574" text-anchor="middle" class="label">point_line_residuals</text>
  <text x="570" y="598" text-anchor="middle" class="small">point residuals: (pred - obs) / point_scale</text>
  <text x="570" y="620" text-anchor="middle" class="small">line residuals: endpoint / center / angle</text>
  <text x="570" y="642" text-anchor="middle" class="small">all terms go into one residual vector</text>
  <text x="570" y="664" text-anchor="middle" class="tiny">invalid point projection -&gt; [2.0, 2.0]</text>
  <text x="570" y="686" text-anchor="middle" class="tiny">invalid line projection -&gt; [2.0, 2.0, 2.0]</text>

  <rect x="425" y="765" width="290" height="95" class="box" fill="#ffffff"/>
  <text x="570" y="799" text-anchor="middle" class="label">Residual vector</text>
  <text x="570" y="823" text-anchor="middle" class="small">[point_xy_errors, line_endpoint,</text>
  <text x="570" y="845" text-anchor="middle" class="small">line_center, line_angle, ...]</text>

  <line x1="310" y1="440" x2="425" y2="295" class="arrow"/>
  <line x1="310" y1="295" x2="425" y2="440" class="arrow"/>
  <line x1="310" y1="585" x2="425" y2="630" class="arrow"/>
  <line x1="310" y1="730" x2="425" y2="630" class="arrow"/>
  <line x1="570" y1="340" x2="570" y2="385" class="arrow"/>
  <line x1="570" y1="495" x2="570" y2="540" class="arrow"/>
  <line x1="570" y1="720" x2="570" y2="765" class="arrow"/>

  <rect x="800" y="180" width="260" height="730" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2" rx="18" ry="18"/>
  <text x="830" y="215" class="section">3. Joint optimization</text>

  <rect x="835" y="320" width="190" height="140" class="box" fill="#ffffff"/>
  <text x="930" y="354" text-anchor="middle" class="label">least_squares</text>
  <text x="930" y="380" text-anchor="middle" class="small">method = 'trf'</text>
  <text x="930" y="404" text-anchor="middle" class="small">max_nfev = 50</text>
  <text x="930" y="428" text-anchor="middle" class="small">optimize one pose only</text>

  <rect x="835" y="520" width="190" height="95" class="box" fill="#ffffff"/>
  <text x="930" y="554" text-anchor="middle" class="label">params_to_rigid3d</text>
  <text x="930" y="578" text-anchor="middle" class="small">result.x -&gt; refined_pose</text>

  <line x1="715" y1="812" x2="835" y2="390" class="arrow"/>
  <line x1="715" y1="440" x2="835" y2="390" class="arrow"/>
  <line x1="930" y1="460" x2="930" y2="520" class="arrow"/>

  <rect x="1110" y="180" width="250" height="730" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="2" rx="18" ry="18"/>
  <text x="1140" y="215" class="section">4. Refined pose validation</text>

  <rect x="1140" y="300" width="190" height="120" class="box" fill="#ffffff"/>
  <text x="1235" y="334" text-anchor="middle" class="label">evaluate_pose_with_</text>
  <text x="1235" y="358" text-anchor="middle" class="label">line_correspondences</text>
  <text x="1235" y="382" text-anchor="middle" class="small">recompute line metrics</text>

  <rect x="1140" y="470" width="190" height="120" class="good"/>
  <text x="1235" y="504" text-anchor="middle" class="label">If refine_ok == true</text>
  <text x="1235" y="528" text-anchor="middle" class="small">final_pose = refined_pose</text>
  <text x="1235" y="550" text-anchor="middle" class="small">line_refinement_applied = true</text>
  <text x="1235" y="572" text-anchor="middle" class="small">update line_residual_after</text>

  <rect x="1140" y="640" width="190" height="110" class="warn"/>
  <text x="1235" y="674" text-anchor="middle" class="label">If refine_ok == false</text>
  <text x="1235" y="698" text-anchor="middle" class="small">keep original point-line</text>
  <text x="1235" y="720" text-anchor="middle" class="small">selected pose</text>

  <rect x="1140" y="800" width="190" height="70" class="box" fill="#ffffff"/>
  <text x="1235" y="834" text-anchor="middle" class="label">Outputs</text>
  <text x="1235" y="858" text-anchor="middle" class="small">before/after residuals + final pose</text>

  <line x1="1025" y1="568" x2="1140" y2="360" class="arrow"/>
  <line x1="1235" y1="420" x2="1235" y2="470" class="arrow"/>
  <line x1="1235" y1="420" x2="1235" y2="640" class="arrow"/>
  <line x1="1235" y1="590" x2="1235" y2="800" class="arrow"/>
  <line x1="1235" y1="750" x2="1235" y2="800" class="arrow"/>

  <text x="700" y="950" text-anchor="middle" class="tiny">Key idea: points and lines are not optimized in two separate stages; they are concatenated into one residual vector and refined in a single least_squares solve.</text>
</svg>
